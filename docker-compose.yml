services:
  php-fpm:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: krishiconnect_php
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./backend/storage:/var/www/storage
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-http://localhost}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-krishiconnect}
      - DB_USERNAME=${DB_USERNAME:-krishiuser}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redissecret}
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - SANCTUM_STATEFUL_DOMAINS=${SANCTUM_STATEFUL_DOMAINS:-localhost,localhost:3000,localhost:3001,127.0.0.1,127.0.0.1:3000,127.0.0.1:3001}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001}
      - FILESYSTEM_DISK=${FILESYSTEM_DISK:-s3}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-ap-southeast-1}
      - AWS_BUCKET=${AWS_BUCKET}
      - FCM_PROJECT_ID=${FCM_PROJECT_ID}
      - FCM_SERVICE_ACCOUNT_JSON=${FCM_SERVICE_ACCOUNT_JSON}
      - SSLCOMMERZ_STORE_ID=${SSLCOMMERZ_STORE_ID}
      - SSLCOMMERZ_STORE_PASSWORD=${SSLCOMMERZ_STORE_PASSWORD}
      - SSLCOMMERZ_IS_SANDBOX=${SSLCOMMERZ_IS_SANDBOX:-true}
      - SSL_WIRELESS_API_URL=${SSL_WIRELESS_API_URL:-https://sms.sslwireless.com/pushapi/dynamic/server.php}
      - SSL_WIRELESS_USER=${SSL_WIRELESS_USER}
      - SSL_WIRELESS_PASS=${SSL_WIRELESS_PASS}
      - SSL_WIRELESS_SENDER_ID=${SSL_WIRELESS_SENDER_ID:-KrishiCon}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - krishiconnect_network

  nginx:
    image: nginx:1.25-alpine
    container_name: krishiconnect_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      php-fpm:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - krishiconnect_network

  postgres:
    image: postgres:16-alpine
    container_name: krishiconnect_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-krishiconnect}
      POSTGRES_USER: ${DB_USERNAME:-krishiuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-krishiuser} -d ${DB_DATABASE:-krishiconnect}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - krishiconnect_network

  redis:
    image: redis:7-alpine
    container_name: krishiconnect_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redissecret}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-redissecret} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - krishiconnect_network

  horizon:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: krishiconnect_horizon
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan horizon
    volumes:
      - ./backend:/var/www
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-krishiconnect}
      - DB_USERNAME=${DB_USERNAME:-krishiuser}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redissecret}
      - QUEUE_CONNECTION=redis
    depends_on:
      php-fpm:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - krishiconnect_network

volumes:
  postgres_data:
  redis_data:

networks:
  krishiconnect_network:
    driver: bridge
